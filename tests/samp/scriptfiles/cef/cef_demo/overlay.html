<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Overlay2D HUD</title>
		<link rel="stylesheet" href="css/app.css">
	</head>

	<body>
		<div class="demo-shell">
			<section class="panel">
				<h1 class="title">Overlay2D HUD</h1>
				<p class="subtitle">Animated overlay.</p>

				<div class="stats">
					<div class="stat"><span>FPS</span><strong id="fps">0</strong></div>
					<div class="stat"><span>Frame</span><strong id="frame">0</strong></div>
					<div class="stat"><span>Time</span><strong id="time">0</strong></div>
					<div class="stat"><span>Mode</span><strong>Overlay2D</strong></div>
				</div>

				<div class="actions">
					<button data-cef-button="overlay-click">JS -> Pawn</button>
					<button class="secondary" id="send-ping">Ping event</button>
				</div>

				<p id="notify" class="subtitle">Waiting for Pawn events...</p>
				<div id="log" class="log"></div>
			</section>

			<section class="stage">
				<div id="box" class="moving-box"></div>
				<div class="progress"><div id="bar-fill"></div></div>
			</section>
		</div>

		<script src="js/cef-bridge.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
