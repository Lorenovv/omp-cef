<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>omp-cef Demo</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="demo-shell">
    <section class="panel">
      <h1 class="title">omp-cef Demo</h1>
      <p class="subtitle">Main resource page. Use Pawn commands to open Overlay2D, World2D and WorldObject3D browsers.</p>
      <div class="stats">
        <div class="stat"><span>Resource</span><strong>cef_demo</strong></div>
        <div class="stat"><span>URL</span><strong>http://cef/</strong></div>
        <div class="stat"><span>Mode</span><strong>Index</strong></div>
        <div class="stat"><span>Status</span><strong>Ready</strong></div>
      </div>
      <div class="actions">
        <button data-cef-button="index-primary">Send JS event</button>
        <button class="secondary" data-cef-button="index-secondary">Secondary</button>
      </div>
    </section>
    <section class="stage">
      <div id="box" class="moving-box"></div>
      <div class="progress"><div id="bar-fill"></div></div>
    </section>
  </div>
  <script src="js/cef-bridge.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
