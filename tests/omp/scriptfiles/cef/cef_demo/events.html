<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>JS Events</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="demo-shell">
    <section class="panel">
      <h1 class="title">JS ↔ Pawn events</h1>
      <p class="subtitle">Use buttons to emit events to Pawn. Use /jsnotify and /jsstats to emit events back to JavaScript.</p>
      <div class="actions">
        <button data-cef-button="events-button">demo:button</button>
        <button id="send-ping" class="secondary">demo:ping</button>
      </div>
      <p id="notify" class="subtitle">No server notification yet.</p>
      <p id="server-stats" class="subtitle">No server stats yet.</p>
      <div id="log" class="log"></div>
    </section>
    <section class="stage">
      <div id="box" class="moving-box"></div>
      <div class="progress"><div id="bar-fill"></div></div>
    </section>
  </div>
  <script src="js/cef-bridge.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
