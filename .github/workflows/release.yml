name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read
  issues: read
  
jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" == v* ]]; then
            echo "::error::Version must be passed without leading 'v' (example: 1.3.0)."
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must use semantic format x.y.z (example: 1.3.0)."
            exit 1
          fi

  call-build-client:
    name: Build Client
    needs: [validate-version]
    uses: ./.github/workflows/build-client-reusable.yml
    with:
      version: ${{ github.event.inputs.version }}
      cef-version: 148.0.10+g7ee53f5+chromium-148.0.7778.218
      cef-arch: windows32
      build-type: Release

  call-build-server:
    name: Build Server (${{ matrix.target }} ${{ matrix.arch }})
    needs: [call-build-client]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ServerOmp
            arch: x86
          - target: ServerOmp
            arch: x64
          - target: ServerSamp
            arch: x86
    uses: ./.github/workflows/build-server-reusable.yml
    with:
      target: ${{ matrix.target }}
      arch: ${{ matrix.arch }}
      build-type: Release

  call-create-release:
    name: Create Release
    needs: [call-build-client, call-build-server]
    uses: ./.github/workflows/create-release-reusable.yml
    with:
      version: ${{ github.event.inputs.version }}
    secrets: inherit
